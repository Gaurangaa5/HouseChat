<!DOCTYPE html>
<html>
<head>
  <title>HouseChat</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Popup Modals & Info Button Styling */
    .info-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 5px;
      margin-left: 5px;
    }
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
    }
    .message.me .meta-row {
      justify-content: flex-end;
    }
    .message:not(.me) .meta-row {
      justify-content: flex-start;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 8px;
      width: 250px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .modal-content h3 {
      margin-top: 0;
      border-bottom: 1px solid #ccc;
      padding-bottom: 10px;
    }
    .status-list {
      text-align: left;
      margin: 15px 0;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 16px;
    }
    .status-item.seen { color: green; }
    .status-item.unseen { color: red; }
    .close-btn {
      background: #007bff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }
    .close-btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<!-- IMMEDIATE SESSION PROTECTION SECURITY BLOCK -->
<script>
  // This runs instantly before any external scripts load to prevent crashing on GitHub Pages paths
  const currentUser = sessionStorage.getItem("housechatUser");
  const pathBase = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) || '';
  
  if (!currentUser) {
    window.location.href = pathBase + "/index.html";
  }
</script>

<div class="chat-container">

  <div class="topbar">
    <h1>HOUSECHAT</h1>
    <div id="userDisplay"></div>
    <button id="clearBtn">CLEAR MY VIEW</button>
  </div>

  <div id="messages"></div>

  <div class="input-area">
    <input id="messageInput" type="text" placeholder="Type message...">
    <button id="sendBtn">SEND</button>
  </div>

</div>

<!-- Seen Status Popup Modal -->
<div id="statusModal" class="modal-overlay">
  <div class="modal-content">
    <h3>Seen Status</h3>
    <div id="statusList" class="status-list"></div>
    <button id="closeModalBtn" class="close-btn">Close</button>
  </div>
</div>

<script type="module">

// Safely display the online indicator now that user validation passed safely
const user = sessionStorage.getItem("housechatUser");
document.getElementById("userDisplay").textContent = "🟢 " + user;

const baseDir = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) || '';

import { db } from "./firebase.js";
import {
  ref,
  push,
  update,
  onValue
} from "https://gstatic.com";

// --- 🔒 CONTROL CENTER INTERCEPTOR LISTENER ---
let banner = document.getElementById("globalBroadcastBanner");
if (!banner) {
  banner = document.createElement("div");
  banner.id = "globalBroadcastBanner";
  banner.style = "background:#ffa502; color:black; font-weight:bold; text-align:center; padding:8px; display:none; font-size:14px; position:sticky; top:0; z-index:999; font-family:sans-serif;";
  document.body.insertBefore(banner, document.body.firstChild);
}

onValue(ref(db, "systemSettings"), (snapshot) => {
  const settings = snapshot.val() || {};

  // Action 1: Emergency Shutdown Check
  if (settings.isShutdown) {
    document.body.innerHTML = `
      <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; background:#121212; color:white; font-family:sans-serif; text-align:center; padding:20px;">
        <h1 style="color:#ff4757; font-size:40px;">🛑 HouseChat Closed</h1>
        <p style="font-size:18px; color:#ccc;">The creator has temporarily disabled the chat room for system maintenance.</p>
      </div>
    `;
    return;
  }

  // Action 2: Kick Selected Profile Out
  if (settings.kickedUsers && user && settings.kickedUsers[user]) {
    sessionStorage.removeItem("housechatUser");
    window.location.href = baseDir + "/index.html";
    return;
  }

  // Action 3: Global Banner Updates
  if (settings.announcement) {
    banner.textContent = "📢 ALERT: " + settings.announcement;
    banner.style.display = "block";
  } else {
    banner.style.display = "none";
  }
});
// --- END CONTROL CENTER INTERCEPTOR ---

const messagesDiv = document.getElementById("messages");
const allUsers = ["Gaurangaa", "Amma", "Appa", "Akka"];
let clearedTime = Number(localStorage.getItem("clearedTime") || 0);

// Global chat object mapping message IDs to their data payload
let currentMessagesData = {};

// Open status popup logic
function openStatusModal(messageId) {
  const msg = currentMessagesData[messageId];
  if (!msg) return;

  const seenBy = msg.seenBy || {};
  const statusListDiv = document.getElementById("statusList");
  statusListDiv.innerHTML = "";

  allUsers.forEach(u => {
    const hasSeen = seenBy[u] === true;
    const item = document.createElement("div");
    item.className = `status-item ${hasSeen ? 'seen' : 'unseen'}`;
    item.innerHTML = `<span>${u}</span> <span>${hasSeen ? '✓' : '✗'}</span>`;
    statusListDiv.appendChild(item);
  });

  document.getElementById("statusModal").style.display = "flex";
}

// Close status popup logic
document.getElementById("closeModalBtn").addEventListener("click", () => {
  document.getElementById("statusModal").style.display = "none";
});

// Render/Update domestic DOM message thread
function renderMessages(messagesSnapshot) {
  if (!user) return; 
  
  const isAtBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop <= messagesDiv.clientHeight + 50;
  
  messagesDiv.innerHTML = "";
  currentMessagesData = {};

  messagesSnapshot.forEach((childSnapshot) => {
    const msgId = childSnapshot.key;
    const msg = childSnapshot.val();

    currentMessagesData[msgId] = msg;

    if (msg.timestamp < clearedTime) {
      return;
    }

    // Automatically mark message as read if current user hasn't seen it yet
    if (!msg.seenBy || !msg.seenBy[user]) {
      update(ref(db, `messages/${msgId}/seenBy`), {
        [user]: true
      });
    }

    const div = document.createElement("div");
    div.className = msg.sender === user ? "message me" : "message";

    const time = new Date(msg.timestamp).toLocaleTimeString([], {
      hour: "2-digit",
      minute: "2-digit"
    });

    div.innerHTML = `
      <div class="sender">${msg.sender}</div>
      <div class="text">${msg.text}</div>
      <div class="meta-row">
        <span class="time">${time}</span>
        <button class="info-btn" data-id="${msgId}">ℹ️</button>
      </div>
    `;

    div.querySelector(".info-btn").addEventListener("click", (e) => {
      const id = e.target.getAttribute("data-id");
      openStatusModal(id);
    });

    messagesDiv.appendChild(div);
  });

  if (isAtBottom) {
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
}

// Listen to entire node tree for continuous sync structure
onValue(ref(db, "messages"), (snapshot) => {
  renderMessages(snapshot);
});

function sendMessage() {
  const input = document.getElementById("messageInput");
  const text = input.value.trim();

  if (!text || !user) return;

  push(ref(db, "messages"), {
    sender: user,
    text: text,
    timestamp: Date.now(),
    seenBy: {
      [user]: true 
    }
  });

  input.value = "";
}

document.getElementById("sendBtn").addEventListener("click", sendMessage);

document.getElementById("messageInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    sendMessage();
  }
});

document.getElementById("clearBtn").addEventListener("click", () => {
  localStorage.setItem("clearedTime", Date.now());
  location.reload();
});

</script>

</body>
</html>
